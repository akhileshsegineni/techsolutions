<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | TECH Solutions</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background-color: var(--bg-alt);
        }

        .auth-card {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 40px 35px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: var(--shadow-md);
        }

        .auth-card h2 {
            color: var(--accent);
            margin-bottom: 25px;
            font-size: 26px;
        }

        .auth-input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .auth-input-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 14px;
        }

        .auth-input-group input {
            width: 100%;
            max-width: 100%;
            padding: 11px 13px;
            border-radius: 6px;
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 14px;
        }

        .auth-input-group input:focus {
            border-color: var(--accent);
            outline: none;
        }

    </style>
</head>
<body>

<div class="header">
    <h1>TECH Solutions</h1>
    <div class="header-login">
        <a href="index.html" class="back-btn">← Back Home</a>
    </div>
</div>

<div class="auth-container">
    <div class="auth-card">
        <h2>Create an Account</h2>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="auth-input-group">
                <label>Full Name</label>
                <input type="text" id="signupFullName" placeholder="Enter your full name" required>
            </div>

            <div class="auth-input-group">
                <label>Email Address</label>
                <input type="email" id="signupEmail" placeholder="Enter your email address" required>
            </div>

            <div class="auth-input-group">
                <label>Username</label>
                <input type="text" id="signupUsername" placeholder="Choose a username" required>
            </div>

            <div class="auth-input-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">Sign Up</button>
        </form>


        <p style="color: var(--text-light); margin-bottom: 12px; font-size: 14px;">Already have an account?</p>
        <a href="login.html" class="btn btn-secondary" style="width: 100%;">Login</a>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
